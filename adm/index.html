<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>J&amp;E Estética — ADM</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#CC0000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="apple-touch-icon" href="/EsteticaAutomotiva/icons/icon-192-adm.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #080808;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    color: #E8EBF2;
  }
  .loading {
    text-align: center;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(204, 0, 0, 0.2);
    border-top-color: #CC0000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: #8A9BB8; font-size: 13px; }
</style>
</head>
<body>
<div class="loading">
  <div class="spinner"></div>
  <p>Carregando painel administrativo...</p>
</div>

<script>
// Registra o SW dedicado ao ADM e redireciona para admin.html
(async function() {
  if ('serviceWorker' in navigator) {
    try {
      // Aguarda o SW do ADM ser registrado e ativado
      const reg = await navigator.serviceWorker.register(
        '/EsteticaAutomotiva/adm/sw.js',
        { scope: '/EsteticaAutomotiva/adm/' }
      );

      // Se já existe um SW ativo, pode ir direto
      if (navigator.serviceWorker.controller) {
        window.location.replace('/EsteticaAutomotiva/admin.html');
        return;
      }

      // Aguarda o SW ficar ativo para fazer o fetch funcionar
      await new Promise(resolve => {
        if (reg.active) { resolve(); return; }
        const sw = reg.installing || reg.waiting;
        if (sw) {
          sw.addEventListener('statechange', function() {
            if (this.state === 'activated') resolve();
          });
        } else {
          // Fallback: espera o controllerchange
          navigator.serviceWorker.addEventListener('controllerchange', resolve, { once: true });
        }
      });

      window.location.replace('/EsteticaAutomotiva/admin.html');
    } catch (err) {
      console.error('[ADM] Erro no SW:', err);
      // Fallback sem SW: redireciona direto
      window.location.replace('/EsteticaAutomotiva/admin.html');
    }
  } else {
    // Navegador sem suporte a SW
    window.location.replace('/EsteticaAutomotiva/admin.html');
  }
})();
</script>
</body>
</html>
