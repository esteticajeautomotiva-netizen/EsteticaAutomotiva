<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>J&amp;E ADM</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#CC0000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="J&E ADM">
<link rel="apple-touch-icon" href="/EsteticaAutomotiva/icons/icon-192-adm.png">
<style>
  body {
    margin: 0;
    background: #080808;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;
    gap: 16px;
  }
  img {
    width: 100px; height: 100px;
    border-radius: 50%;
    border: 2px solid #CC0000;
    box-shadow: 0 0 30px rgba(204,0,0,0.5);
    animation: pulse 1.5s ease-in-out infinite;
  }
  p { color: #888; font-family: sans-serif; font-size: 13px; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
</style>
</head>
<body>
  <img src="/EsteticaAutomotiva/icons/icon-192-adm.png" alt="J&E ADM">
  <p>Carregando painel administrativo...</p>

  <script>
    // Registra o SW local (escopo /adm/) antes de qualquer coisa
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js', { scope: '/EsteticaAutomotiva/adm/' })
        .then(reg => {
          // Aguarda o SW estar ativo e então navega para o admin real
          // O SW intercepta essa URL e serve admin.html sem redirecionar
          if (reg.active) {
            loadAdmin();
          } else {
            const worker = reg.installing || reg.waiting;
            worker.addEventListener('statechange', () => {
              if (worker.state === 'activated') loadAdmin();
            });
          }
        })
        .catch(err => {
          // Se SW falhar, cai no redirect tradicional como fallback
          console.warn('SW não disponível, usando redirect:', err);
          window.location.replace('/EsteticaAutomotiva/admin.html');
        });
    } else {
      // Browser sem suporte a SW — redirect direto
      window.location.replace('/EsteticaAutomotiva/admin.html');
    }

    function loadAdmin() {
      // Usa fetch + document.write para carregar admin.html NO MESMO contexto
      // mantendo a URL /adm/ — o PWA não "sai" do escopo
      fetch('/EsteticaAutomotiva/admin.html')
        .then(r => r.text())
        .then(html => {
          // Substitui o documento inteiro sem mudar a URL
          document.open();
          document.write(html);
          document.close();
          // Corrige caminhos relativos dos scripts/css que admin.html usa
          // (eles já usam caminhos absolutos /EsteticaAutomotiva/... então funciona)
        })
        .catch(() => {
          window.location.replace('/EsteticaAutomotiva/admin.html');
        });
    }
  </script>
</body>
</html>
